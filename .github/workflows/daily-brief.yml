name: Daily Brief (generate and publish)

on:
  schedule:
    # 以下时间均为 UTC，对应北京时间（UTC+8）
    - cron: '0 16 * * *'   # 北京时间 00:00
    - cron: '0 21 * * *'   # 北京时间 05:00
    - cron: '40 0 * * *'   # 北京时间 08:40
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '0 7 * * *'    # 北京时间 15:00
    - cron: '0 11 * * *'   # 北京时间 19:00
  workflow_dispatch:       # 保留手动触发，方便测试

permissions:
  # 仅需要默认权限来运行脚本并访问 secrets
  contents: read

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Generate brief and insert to Supabase
        env:
          SUPS_URL: ${{ secrets.SUPS_URL02 }}
          SUPS_KEY: ${{ secrets.SUPS_API02 }}   # 应为 service_role key 用于写入
        run: |
          python scripts/generate_brief.py
