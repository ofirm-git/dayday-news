name: Test AA secret (set + compare)

on:
  push:
    branches: [ AAtest ]

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret AA is set
        shell: bash
        run: |
          if [ -n "${{ secrets.AA }}" ]; then
            echo "Secret AA is SET"
          else
            echo "Secret AA is EMPTY"
          fi

      - name: Compare secret AA to expected value
        shell: bash
        run: |
          if [ "${{ secrets.AA }}" = "aa" ]; then
            echo "Secret AA matches expected value"
          else
            echo "Secret AA does NOT match expected value"
          fi
