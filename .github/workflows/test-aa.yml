name: Test AA secret

on:
  push:
    branches:
      - AAtest

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret AA
        shell: bash
        run: |
          if [ -n "${{ secrets.AA }}" ]; then
            echo "Secret AA is SET"
          else
            echo "Secret AA is EMPTY"
          fi
          run: |
          if [ "${{ secrets.AA }}" = "aa" ]; then
            echo "Secret AA matches expected value"
          else
            echo "Secret AA does NOT match expected value"
          fi
